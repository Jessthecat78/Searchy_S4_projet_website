<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Searchy | Contact</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-wrapper">
        <a class="brand" href="index.html">Searchy</a>
        <nav aria-label="Main navigation">
          <ul class="nav-list">
            <li><a class="nav-link" href="index.html">Home</a></li>
            <li><a class="nav-link" href="avancement.html">Progress</a></li>
            <li><a class="nav-link active" href="contact.html">Contact</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      <section class="section">
        <div class="container">
          <h1>Team contact</h1>
          <p class="lead">
            Add your team details below (photo, first name, last name, and role).
          </p>

          <div class="card-grid team-grid">
            <article class="card member-card">
              <div class="photo-placeholder" aria-hidden="true">Photo 1</div>
              <h2>First name Last name</h2>
              <p class="muted">Role</p>
            </article>

            <article class="card member-card">
              <div class="photo-placeholder" aria-hidden="true">Photo 2</div>
              <h2>First name Last name</h2>
              <p class="muted">Role</p>
            </article>

            <article class="card member-card">
              <div class="photo-placeholder" aria-hidden="true">Photo 3</div>
              <h2>First name Last name</h2>
              <p class="muted">Role</p>
            </article>

            <article class="card member-card">
              <div class="photo-placeholder" aria-hidden="true">Photo 4</div>
              <h2>First name Last name</h2>
              <p class="muted">Role</p>
            </article>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>Searchy - Contact page</p>
      </div>
    </footer>
  </body>
</html>
